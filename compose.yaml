services:
  db:
    image: docker.io/library/postgres:18-alpine
    container_name: puerbaria-db
    environment:
      POSTGRES_DB: puerbaria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      # Desde postgres:18 el volumen va en /var/lib/postgresql (ya no /data)
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d puerbaria_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
