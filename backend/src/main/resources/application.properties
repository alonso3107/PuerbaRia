# Configuracion de la Aplicacion - Puerba Ria Backend
spring.application.name=backend

# Base de Datos PostgreSQL
# En produccion se definen via variables de entorno; sin ellas usa la BD local de desarrollo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/puerbaria_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Admin por defecto (se crea automaticamente al iniciar si no existe)
admin_email=${ADMIN_EMAIL:admin@puerbaria.com}
admin_password=${ADMIN_PASSWORD:Admin123!}

# Seguridad y JWT (Base64; en produccion definir JWT_SECRET via variable de entorno)
jwt.secret=${JWT_SECRET:zLv4k0zX/agMqMZAFvblT8praxOnAIwLyIPMFZcgI3us0aJOmQ8mRzu/AuAY95/J}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Directorio de uploads para vouchers
voucher.upload-dir=uploads/vouchers

# Limites multipart alineados con la validacion del formulario de vouchers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
