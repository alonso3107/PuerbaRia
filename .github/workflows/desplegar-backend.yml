name: Desplegar backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/desplegar-backend.yml'
  workflow_dispatch:

concurrency:
  group: desplegar-backend
  cancel-in-progress: false

jobs:
  publicar-imagen:
    name: Publicar imagen en GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/puerbaria-backend:latest
            ghcr.io/${{ github.repository_owner }}/puerbaria-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  desplegar:
    name: Actualizar la VM
    runs-on: ubuntu-latest
    needs: publicar-imagen
    steps:
      - name: Reiniciar el backend con la imagen nueva
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USUARIO }}
          key: ${{ secrets.VM_LLAVE_SSH }}
          script: |
            cd /opt/puerbaria
            docker compose pull backend
            docker compose up -d
            docker image prune -f
