<div class="client-dashboard-container magic-entrance">
  <div class="dashboard-header">
    <div class="header-content">
      <h1 class="title">Mis Reservas</h1>
      <p class="subtitle">Gestiona y revisa el estado de tus reservas y pagos.</p>
    </div>
  </div>

  <div class="dashboard-card">
    <p-table 
      [value]="vouchers()" 
      [loading]="isLoading()" 
      styleClass="p-datatable-striped p-datatable-premium"
      [paginator]="true" 
      [rows]="5" 
      responsiveLayout="scroll">
      
      <ng-template pTemplate="header">
        <tr>
          <th>Habitación</th>
          <th>Monto</th>
          <th>Fecha Pago</th>
          <th>Código Op.</th>
          <th>Estado</th>
        </tr>
      </ng-template>
      
      <ng-template pTemplate="body" let-voucher>
        <tr class="table-row-hover">
          <td class="font-bold text-accent">{{ voucher.habitacion }}</td>
          <td>S/ {{ voucher.monto | number:'1.2-2' }}</td>
          <td>{{ voucher.fechaPago | date:'dd MMM yyyy' }}</td>
          <td><span class="codigo-chip">{{ voucher.codigoOperacion }}</span></td>
          <td>
            <p-tag [value]="voucher.estado" [severity]="getSeverity(voucher.estado)"></p-tag>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="empty-state">
            <i class="pi pi-inbox empty-icon"></i>
            <p>No tienes reservas registradas aún.</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
