<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Puerba Ria — Coastal Luxury</title>
  <meta name="description" content="Hotel de lujo frente al mar en Ica, Peru. Habitaciones, restaurante gourmet, SPA & Wellness.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="hotel.png">

  <!-- Google Fonts: Cormorant Garamond (editorial) + Work Sans (cuerpo) + Instrument Serif (fallback) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Instrument+Serif:ital@0;1&family=Work+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
    rel="stylesheet">

  <!-- Prevenir FOUC en dark mode (flash of unstyled content) -->
  <script>
    (function() {
      const tema = localStorage.getItem('puerbaria-tema');
      if (tema === 'oscuro' || (!tema && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
